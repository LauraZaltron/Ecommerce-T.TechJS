<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Infancias Lectoras</title>
    <link rel="stylesheet" href="../css/styles.css">
        <!-- Google Fonts: Fredoka y Quicksand -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="logo"><h1>Infancias Lectoras</h1></div>
        <nav class="main-nav">
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="./libros.html">Libros</a></li>
                <li><a href="./contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="contact-section">
            <h3 class="section-title">¿Tienes alguna duda?</h3>
            <p style="text-align: center;">Envíanos un mensaje y te asesoraremos con la mejor lectura para los peques.</p>
            
            <form class="contact-form">
                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label>Consulta:</label>
                    <textarea name="consulta" placeholder="¿En qué podemos ayudarte?"></textarea>
                </div>
                <button type="submit" class="btn-add">Enviar Mensaje</button>
            </form>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Infancias Lectoras</p>
    </footer>
</body>
</html>
